server:
  address: 'tcp://0.0.0.0:9091'

identity_validation:
  reset_password:
    jwt_secret: /secrets/jwt_secret

session:
  secret: /secrets/session_secret
  cookies:
    - domain: hopsakee.top
      authelia_url: https://auth.hopsakee.top

storage:
  encryption_key: /secrets/storage_encryption_key
  local:
    path: /data/authelia/db.sqlite3

authentication_backend:
  file:
    path: /config/authelia/users_database.yml

notifier:
  smtp:
    username: /secrets/smtp_username
    password: /secrets/smtp_password
    address: 'smtp://smtp.gmail.com:587'
    sender: /secrets/smtp_username

access_control:
  default_policy: deny
  rules:
    - domain: auth.hopsakee.top
      policy: bypass
    - domain: infoflow.hopsakee.top
      policy: one_factor
      subject:
        - ['group:me', 'group:admins']
    - domain: govchat.hopsakee.top
      policy: one_factor
      subject:
        - ['group:me', 'group:work', 'group:admins']
    - domain: netflix-movies.hopsakee.top
      policy: one_factor
      subject:
        - ['group:me', 'group:friends', 'group:admins']
